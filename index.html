<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IstanbulCity Spor Kulübü</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family: Arial, Helvetica, sans-serif;
      background:#0b0b0f;
      color:#fff;
      line-height:1.5;
    }

    /* NAVBAR */
    .nav{
      position:sticky;
      top:0;
      background:#111018;
      padding:14px 20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:2px solid #ff4fa3;
      z-index:10;
    }

    .nav h1{
      color:#ff4fa3;
      font-size:20px;
      letter-spacing:1px;
    }

    .nav a{
      color:#fff;
      text-decoration:none;
      margin-left:18px;
      font-size:14px;
      opacity:.85;
      transition:.2s;
    }

    .nav a:hover{opacity:1;color:#ff4fa3}

    /* HERO */
    .hero{
      text-align:center;
      padding:40px 20px 20px;
    }

    .hero img{
      width:180px;
      max-width:90%;
      border-radius:50%;
      box-shadow:0 0 30px rgba(255,79,163,.35);
    }

    .hero h2{
      margin-top:18px;
      font-size:28px;
      color:#ff4fa3;
    }

    .hero p{opacity:.8;margin-top:6px}

    /* SECTIONS */
    .section{
      padding:40px 20px;
      text-align:center;
    }

    .section h3{
      color:#ff4fa3;
      margin-bottom:20px;
      font-size:24px;
    }

    .card{
      max-width:520px;
      margin:0 auto;
      background:#15151d;
      padding:16px;
      border-radius:18px;
      box-shadow:0 10px 30px rgba(0,0,0,.5);
      transition:.25s;
    }

    .card:hover{
      transform:translateY(-6px);
      box-shadow:0 16px 40px rgba(255,79,163,.25);
    }

    .card img{
      width:100%;
      border-radius:14px;
      display:block;
    }

    /* FOOTER */
    footer{
      text-align:center;
      padding:30px 15px;
      background:#0f0f14;
      margin-top:40px;
      font-size:13px;
      opacity:.75;
    }

    /* MOBILE */
    @media (max-width:600px){
      .nav h1{font-size:16px}
      .nav a{margin-left:10px;font-size:12px}
      .hero h2{font-size:22px}
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div class="nav">
    <h1>İSTANBULCITY</h1>
    <div>
      <a href="#mac">Maç</a>
      <a href="#sonuc">Sonuç</a>
      <a href="#transfer">Transfer</a>
    </div>
  </div>

  <!-- HERO -->
  <section class="hero">
    <img src="logo.png" alt="IstanbulCity Logo">
    <h2>IstanbulCity Spor Kulübü</h2>
    <p>Resmi Taraftar Sitesi</p>
  </section>

  <!-- MATCHDAY -->
  <section id="mac" class="section">
    <h3>Son Maç</h3>
    <div class="card">
      <img src="matchday.png" alt="Son maç">
    </div>
  </section>

  <!-- RESULT -->
  <section id="sonuc" class="section">
    <h3>Maç Sonucu</h3>
    <div class="card">
      <img src="mac-sonucu.png" alt="Maç sonucu">
    </div>
  </section>

  <!-- TRANSFER -->
  <section id="transfer" class="section">
    <h3>Transfer Haberleri</h3>
    <div class="card">
      <img src="transfer.png" alt="Transfer">
    </div>
  </section>

  <footer>
    © 2026 IstanbulCity Spor Kulübü — Tüm hakları saklıdır.
  </footer>

</body>
</html>
